<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>K'Helper — Cambodians in Korea</title>
<meta name="description" content="K'Helper — AI assistant for Cambodians living in South Korea. Visa, work rights, healthcare, daily life support in Khmer, Korean, and English.">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&family=Noto+Sans+Khmer:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --surface: #faf7f4;
    --white: #ffffff;
    --border: #e8e0d6;
    --border-light: #f0ebe4;
    --text-primary: #1a1612;
    --text-secondary: #6b5f52;
    --text-muted: #a0917f;
    --accent: #c4622d;
    --accent-light: #f5ede6;
    --accent-hover: #b05528;
    --user-bubble: #1a1612;
    --crisis: #dc2626;
    --crisis-light: #fef2f2;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --radius: 12px;
    --radius-sm: 8px;
    --nav-h: 60px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    height: 100dvh;
  }
  body.lang-km, body.lang-km input, body.lang-km textarea,
  body.lang-km .msg-bubble, body.lang-km .topic-item span,
  body.lang-km .s-title, body.lang-km .s-sub,
  body.lang-km .nav-label, body.lang-km .welcome-sub {
    font-family: 'Noto Sans Khmer', sans-serif;
    line-height: 2;
  }
  body.lang-km .msg-bubble { font-size: 15px; line-height: 2.1; }
  body.lang-km .welcome-title { font-family: 'Noto Sans Khmer', sans-serif; font-size: 20px; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .sidebar-header { padding: 20px 18px 14px; border-bottom: 1px solid var(--border-light); }
  .brand { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
  .brand-icon {
    width: 28px; height: 28px; background: var(--accent);
    border-radius: 7px; display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .brand-name { font-family: 'Lora', serif; font-size: 17px; font-weight: 500; }
  .brand-name span { color: var(--accent); }
  .new-chat-btn {
    width: 100%; display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; background: var(--white);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text-secondary); font-family: inherit; font-size: 13px;
    cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow-sm);
  }
  .new-chat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sidebar-section { padding: 12px 18px 8px; overflow-y: auto; flex: 1; }
  .sidebar-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .topic-item {
    display: flex; align-items: center; gap: 9px; padding: 7px 10px;
    border-radius: var(--radius-sm); cursor: pointer; transition: background 0.12s;
    color: var(--text-secondary); font-size: 13px; margin-bottom: 1px;
  }
  .topic-item:hover { background: var(--accent-light); color: var(--accent); }
  .topic-icon { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }
  .topic-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-footer { padding: 12px 18px; border-top: 1px solid var(--border-light); flex-shrink: 0; }
  .lang-selector { display: flex; gap: 4px; }
  .lang-btn {
    flex: 1; padding: 5px 4px; background: none; border: 1px solid var(--border);
    border-radius: 6px; font-size: 11px; color: var(--text-muted);
    cursor: pointer; transition: all 0.12s; font-family: inherit;
  }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .lang-btn.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 500; }

  /* ── MAIN ── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--white); }
  .chat-area {
    flex: 1; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    display: flex; flex-direction: column; padding-bottom: 8px;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* Welcome */
  .welcome-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 20px 20px; text-align: center;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .welcome-logo {
    width: 48px; height: 48px; background: var(--accent);
    border-radius: 13px; display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin-bottom: 16px;
    box-shadow: 0 4px 16px rgba(196,98,45,0.22);
  }
  .welcome-title {
    font-family: 'Lora', serif; font-size: 22px; font-weight: 500;
    color: var(--text-primary); margin-bottom: 8px; line-height: 1.3;
  }
  .welcome-sub {
    font-size: 13px; color: var(--text-muted); line-height: 1.65;
    max-width: 340px; margin-bottom: 28px;
  }
  .suggestions {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 10px; max-width: 480px; width: 100%;
  }
  .suggestion-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 14px;
    cursor: pointer; transition: all 0.15s; text-align: left;
    min-height: 80px; display: flex; flex-direction: column; justify-content: center;
  }
  .suggestion-card:hover, .suggestion-card:active {
    border-color: var(--accent); background: var(--accent-light);
    transform: translateY(-1px);
  }
  .s-icon { font-size: 20px; margin-bottom: 8px; display: block; }
  .s-title { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 3px; line-height: 1.4; }
  .s-sub { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

  /* Messages */
  .messages-container { padding: 16px 0 8px; display: flex; flex-direction: column; }
  .message-row { padding: 4px 16px; display: flex; gap: 10px; animation: fadeIn 0.25s ease; }
  .message-row.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 26px; height: 26px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; flex-shrink: 0; margin-top: 3px;
  }
  .message-row.assistant .msg-avatar { background: var(--accent); }
  .message-row.user .msg-avatar { background: var(--user-bubble); }
  .msg-content { max-width: min(520px, 80vw); min-width: 0; }
  .msg-bubble {
    padding: 10px 14px; border-radius: 14px;
    font-size: 14px; line-height: 1.75;
    word-break: break-word;
  }
  .message-row.assistant .msg-bubble {
    background: var(--surface); border: 1px solid var(--border-light);
    color: var(--text-primary); border-top-left-radius: 4px;
  }
  .message-row.user .msg-bubble {
    background: var(--user-bubble); color: #f5f0eb;
    border-top-right-radius: 4px; white-space: pre-wrap;
  }
  /* Crisis message style */
  .message-row.crisis .msg-bubble {
    background: var(--crisis-light); border: 1px solid #fca5a5;
    color: var(--text-primary);
  }
  /* Markdown rendered inside assistant bubbles */
  .msg-bubble strong { font-weight: 600; }
  .msg-bubble em { font-style: italic; }
  .msg-bubble a { color: var(--accent); text-decoration: underline; }
  .msg-bubble .msg-step { display: block; margin: 4px 0; }
  .msg-bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
  .msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .msg-bubble th { background: var(--accent-light); font-weight: 600; }
  .msg-bubble .warning-block {
    background: #fffbeb; border: 1px solid #fbbf24;
    border-radius: 8px; padding: 10px 12px; margin: 8px 0;
    font-size: 13px;
  }

  /* Rate limit banner */
  .rate-banner {
    background: var(--accent-light); border-top: 1px solid var(--border);
    padding: 8px 16px; font-size: 12px; color: var(--accent);
    text-align: center; display: none;
  }

  /* Typing dots */
  .typing-dots { display: flex; gap: 4px; padding: 12px 14px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: pulse 1.3s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,60%,100% { transform: scale(0.8); opacity: 0.4; } 30% { transform: scale(1); opacity: 1; } }

  /* ── INPUT ── */
  .input-section {
    padding: 10px 14px 14px; background: var(--white);
    border-top: 1px solid var(--border-light); flex-shrink: 0;
  }
  .input-box {
    display: flex; align-items: flex-end; gap: 8px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 8px 8px 8px 14px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,98,45,0.08); }
  #userInput {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text-primary); font-family: inherit;
    font-size: 14px; line-height: 1.55;
    resize: none; max-height: 120px; min-height: 22px; scrollbar-width: none;
  }
  #userInput::-webkit-scrollbar { display: none; }
  .send-btn {
    width: 34px; height: 34px; border-radius: 9px;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s, transform 0.12s; color: white;
  }
  .send-btn:hover { background: var(--accent-hover); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }
  .input-hint { font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 6px; }
  .msg-counter { font-size: 10px; color: var(--text-muted); text-align: right; margin-top: 4px; }
  .msg-counter.warning { color: var(--accent); }

  /* ── MOBILE NAV ── */
  .mobile-nav {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--nav-h); background: var(--white);
    border-top: 1px solid var(--border); z-index: 50;
    padding: 0 4px; overflow-x: auto; scrollbar-width: none;
    align-items: center; gap: 2px;
  }
  .mobile-nav::-webkit-scrollbar { display: none; }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 10px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background 0.12s; flex-shrink: 0; min-width: 60px;
  }
  .nav-item:hover, .nav-item:active { background: var(--accent-light); }
  .nav-icon { font-size: 18px; }
  .nav-label { font-size: 9px; color: var(--text-muted); white-space: nowrap; font-family: inherit; }
  .nav-lang { display: flex; gap: 3px; padding: 6px 8px; border-left: 1px solid var(--border-light); flex-shrink: 0; margin-left: auto; }
  .nav-lang-btn {
    padding: 4px 7px; border-radius: 5px; font-size: 10px;
    border: 1px solid var(--border); background: none; color: var(--text-muted);
    cursor: pointer; font-family: inherit; transition: all 0.12s;
  }
  .nav-lang-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  @media (max-width: 640px) {
    .sidebar { display: none; }
    .mobile-nav { display: flex; }
    .chat-area { padding-bottom: calc(var(--nav-h) + 4px); }
    .input-section { padding-bottom: calc(var(--nav-h) + 10px); }
    .welcome-screen { padding: 24px 16px 20px; }
    .suggestions { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .message-row { padding: 4px 12px; }
    .msg-content { max-width: 85vw; }
  }
  @media (max-width: 380px) {
    .suggestions { grid-template-columns: 1fr; }
    .welcome-title { font-size: 20px; }
  }
</style>
</head>
<body class="lang-km">

<!-- SIDEBAR -->

<script>
// ============================================================
// K'HELPER FRONTEND — AGENT 2 CLIENT LAYER
// Security: All API calls go through /.netlify/functions/chat
// No API keys in this file.
// ============================================================

// ── CLIENT-SIDE RATE LIMITER ──
const HOURLY_LIMIT = 30;
function getMessageCount() {
  const data = JSON.parse(localStorage.getItem('kh_rate') || '{"count":0,"hour":0}');
  const currentHour = Math.floor(Date.now() / 3600000);
  if (data.hour !== currentHour) return { count: 0, hour: currentHour };
  return data;
}
function incrementMessageCount() {
  const data = getMessageCount();
  data.count++;
  data.hour = Math.floor(Date.now() / 3600000);
  localStorage.setItem('kh_rate', JSON.stringify(data));
  return data.count;
}
function isClientRateLimited() {
  return getMessageCount().count >= HOURLY_LIMIT;
}
function updateCounter() {
  const { count } = getMessageCount();
  const remaining = HOURLY_LIMIT - count;
  const counter = document.getElementById('msgCounter');
  if (remaining <= 10) {
    counter.textContent = `${remaining} messages left this hour`;
    counter.className = 'msg-counter warning';
  } else {
    counter.textContent = '';
  }
}

// ── MARKDOWN RENDERER ──
// Converts AI markdown to safe HTML
function renderMarkdown(text) {
  if (!text) return '';
  let html = text
    // Escape raw HTML
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    // Warning blocks (⚠️ lines)
    .replace(/(⚠️[^\n]+)/g, '<div class="warning-block">$1</div>')
    // Bold
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    // Numbered list items
    .replace(/^(\d+)\.\s(.+)$/gm, '<span class="msg-step"><strong>$1.</strong> $2</span>')
    // Headers
    .replace(/^#{1,3}\s(.+)$/gm, '<strong>$1</strong>')
    // Line breaks
    .replace(/\n/g, '<br>');
  return html;
}

// ── TRANSLATIONS ──

      { icon: '🏠', label: 'Housing & Renting',    prompt: 'Help me understand renting and housing contracts in Korea.' },
      { icon: '📞', label: 'Support Centers',       prompt: 'What support centers and hotlines can help Cambodians in Korea? Give real addresses and phone numbers.' },
    ],
    suggestions: [

      { icon: '💼', title: 'Work rights',       sub: 'Contracts, wages, protections',  prompt: 'I just started a new job in Korea. What are my basic work rights?' },
      { icon: '🏥', title: 'Health insurance',  sub: 'NHIS, hospitals, clinics',       prompt: 'How do I register for Korean health insurance as a foreigner?' },
      { icon: '🙏', title: 'Korean culture',    sub: 'Customs, etiquette, daily life', prompt: 'What are important Korean customs I should know as a Cambodian?' },
    ],
    emergency: '🆘 Emergency: Immigration <strong>1345</strong> · Ambulance <strong>119</strong> · Cambodian Embassy <strong>02-3785-1041</strong>'
  },
  ko: {

let conversationHistory = [];
let currentLang = localStorage.getItem('khelper_lang') || 'km';

function renderUI() {
  const t = T[currentLang];
  document.body.className = 'lang-' + currentLang;
  document.getElementById('newChatLabel').textContent = t.newChat;
  document.getElementById('topicsLabel').textContent = t.topicsLabel;
  document.getElementById('langLabel').textContent = t.langLabel;
  ['en','ko','km'].forEach(l => {
    const cap = l.charAt(0).toUpperCase() + l.slice(1);
    document.getElementById('btn' + cap).classList.toggle('active', l === currentLang);
    document.getElementById('mBtn' + cap).classList.toggle('active', l === currentLang);
  });
  // Desktop topics
  const list = document.getElementById('topicsList');
  list.innerHTML = '';
  t.topics.forEach(topic => {
    const div = document.createElement('div');
    div.className = 'topic-item';
    div.onclick = () => sendTopic(topic.prompt);
    div.innerHTML = `<span class="topic-icon">${topic.icon}</span><span>${topic.label}</span>`;
    list.appendChild(div);
  });
  // Mobile topics
  const mTopics = document.getElementById('mobileTopics');
  mTopics.innerHTML = '';
  t.topics.forEach(topic => {
    const div = document.createElement('div');
    div.className = 'nav-item';
    div.onclick = () => sendTopic(topic.prompt);
    div.innerHTML = `<span class="nav-icon">${topic.icon}</span><span class="nav-label">${topic.label}</span>`;
    mTopics.appendChild(div);
  });
  // Welcome screen
  document.getElementById('welcomeTitle').textContent = t.welcomeTitle;
  document.getElementById('welcomeSub').textContent = t.welcomeSub;
  document.getElementById('emergencyText').innerHTML = t.emergency;
  document.getElementById('userInput').placeholder = t.placeholder;
  document.getElementById('inputHint').textContent = t.hint;
  document.getElementById('navNew').textContent = t.newChat;
  // Suggestion cards
  const grid = document.getElementById('suggestionGrid');
  grid.innerHTML = '';
  t.suggestions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'suggestion-card';
    div.onclick = () => sendTopic(s.prompt);
    div.innerHTML = `<span class="s-icon">${s.icon}</span><div class="s-title">${s.title}</div><div class="s-sub">${s.sub}</div>`;
    grid.appendChild(div);
  });
  updateCounter();
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('khelper_lang', lang);
  conversationHistory = [];
  renderUI();
}

function newChat() {
  conversationHistory = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('messages').style.display = 'none';
  document.getElementById('welcomeScreen').style.display = 'flex';
}

function showMessages() {
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('messages').style.display = 'flex';
}

function sendTopic(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function appendMessage(role, html, isCrisis = false) {
  showMessages();
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `message-row ${role}${isCrisis ? ' crisis' : ''}`;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'assistant' ? '🏮' : '👤';
  const content = document.createElement('div');
  content.className = 'msg-content';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (role === 'assistant') {
    bubble.innerHTML = html; // Rendered markdown
  } else {
    bubble.textContent = html; // Plain text for user messages
  }
  content.appendChild(bubble);
  row.appendChild(avatar);
  row.appendChild(content);
  container.appendChild(row);
  document.getElementById('chatArea').scrollTop = 999999;
}

function addTyping() {
  showMessages();
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'message-row assistant';
  row.id = 'typingRow';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🏮';
  const content = document.createElement('div');
  content.className = 'msg-content';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble typing-dots';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  content.appendChild(bubble);
  row.appendChild(avatar);
  row.appendChild(content);
  container.appendChild(row);
  document.getElementById('chatArea').scrollTop = 999999;
}

function removeTyping() {
  const el = document.getElementById('typingRow');
  if (el) el.remove();
}

// ── AUTO-RESIZE TEXTAREA ──
const ta = document.getElementById('userInput');
ta.addEventListener('input', () => {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
});
ta.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── SEND MESSAGE ──
async function sendMessage() {
  const text = ta.value.trim();
  if (!text) return;

  // Client-side rate limit check
  if (isClientRateLimited()) {
    const banner = document.getElementById('rateBanner');
    banner.textContent = T[currentLang].rateLimited;
    banner.style.display = 'block';
    return;
  }

  ta.value = '';
  ta.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  addTyping();

  const count = incrementMessageCount();
  updateCounter();

  try {
    // ── Secure API call — NO key in frontend ──
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });

    const data = await res.json();
    removeTyping();

    if (data.error) {
      const isCrisis = data.error.includes('1345') || data.error.includes('112');
      appendMessage('assistant', renderMarkdown(data.error), isCrisis);
    } else {
      const reply = data.choices?.[0]?.message?.content || 'Sorry, no response received.';
      const isCrisis = reply.includes('1393') || reply.includes('EMERGENCY');
      appendMessage('assistant', renderMarkdown(reply), isCrisis);
      conversationHistory.push({ role: 'assistant', content: reply });
    }
  } catch (err) {
    removeTyping();
    appendMessage('assistant', renderMarkdown('⚠️ Connection error. Please check your internet and try again.\n\nFor urgent help: **Immigration 1345** · **Police 112**'));
  }

  document.getElementById('sendBtn').disabled = false;
  ta.focus();
}

window.onload = renderUI;
