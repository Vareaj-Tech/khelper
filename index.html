<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K'Helper — ជំនួយការខ្មែរនៅកូរ៉េ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdf6f2;
      --sidebar-bg: #f5ebe4;
      --sidebar-hover: #ecddd5;
      --border: #e8d5cb;
      --accent: #d94e1f;
      --accent-hover: #c44018;
      --accent-light: #fce8df;
      --text: #2d1f1a;
      --text-muted: #8c6b5e;
      --text-light: #b8907e;
      --user-bubble: #1a1a2e;
      --user-text: #ffffff;
      --bot-bg: #ffffff;
      --card-bg: #ffffff;
      --card-border: #f0ddd5;
      --card-hover: #fff3ee;
      --input-bg: #ffffff;
      --shadow: 0 1px 3px rgba(180,100,60,0.08);
      --shadow-md: 0 4px 12px rgba(180,100,60,0.12);
      --radius: 12px;
      --radius-sm: 8px;
      --font: 'Inter', 'Noto Sans Khmer', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ══════════════════════════════
       SIDEBAR
    ══════════════════════════════ */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 16px 14px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
    }

    .new-chat-btn {
      margin: 0 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .new-chat-btn:hover {
      background: var(--sidebar-hover);
      border-color: var(--accent);
      color: var(--accent);
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-light);
      padding: 0 16px 8px;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px;
    }

    .sidebar-nav::-webkit-scrollbar { width: 3px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      color: var(--text-muted);
      transition: all 0.15s;
      margin-bottom: 2px;
    }

    .nav-item:hover {
      background: var(--sidebar-hover);
      color: var(--text);
    }

    .nav-item.active {
      background: var(--accent-light);
      color: var(--accent);
    }

    .nav-icon { font-size: 16px; flex-shrink: 0; }

    /* ── MAP PANEL ── */
    #map-panel {
      display: none;
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 360px;
      background: var(--bg);
      border-left: 1.5px solid var(--border);
      z-index: 100;
      flex-direction: column;
      box-shadow: -4px 0 20px rgba(180,100,60,0.1);
    }

    #map-panel.open { display: flex; }

    .map-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--sidebar-bg);
    }

    .map-panel-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .map-close-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-muted);
      padding: 2px 6px;
      border-radius: 6px;
      line-height: 1;
    }

    .map-close-btn:hover { background: var(--sidebar-hover); }

    .map-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--sidebar-bg);
      overflow-x: auto;
    }

    .map-tab {
      flex: 1;
      padding: 10px 6px;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: var(--font);
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .map-tab:hover { color: var(--accent); }
    .map-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .map-search-row {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .map-search-input {
      flex: 1;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 13px;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
    }

    .map-search-input:focus { border-color: var(--accent); }

    .map-search-btn {
      padding: 8px 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.15s;
    }

    .map-search-btn:hover { background: var(--accent-hover); }

    .map-locations-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .map-locations-list::-webkit-scrollbar { width: 3px; }
    .map-locations-list::-webkit-scrollbar-thumb { background: var(--border); }

    .map-location-card {
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
    }

    .map-loc-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .map-loc-kr {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .map-loc-note {
      font-size: 11px;
      color: var(--text-light);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .map-buttons {
      display: flex;
      gap: 6px;
    }

    .map-btn {
      flex: 1;
      padding: 7px 6px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: all 0.15s;
      display: block;
    }

    .map-btn.kakao {
      background: #FEE500;
      color: #3C1E1E;
      border: none;
    }

    .map-btn.kakao:hover { background: #f5dc00; }

    .map-btn.naver {
      background: #03C75A;
      color: white;
      border: none;
    }

    .map-btn.naver:hover { background: #02b350; }

    .map-btn.google {
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid var(--card-border);
    }

    .map-btn.google:hover { background: #fde0d4; }

    /* Map link in chat bubble */
    .map-link-row {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--card-border);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .inline-map-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .inline-map-btn.kakao { background: #FEE500; color: #3C1E1E; }
    .inline-map-btn.naver { background: #03C75A; color: white; }
    .inline-map-btn.panel { background: var(--accent-light); color: var(--accent); border: none; font-family: var(--font); }
    .inline-map-btn.panel:hover { background: #fde0d4; }

    /* Language switcher */
    .lang-section {
      padding: 14px 12px;
      border-top: 1px solid var(--border);
    }

    .lang-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-light);
      margin-bottom: 8px;
    }

    .lang-buttons {
      display: flex;
      gap: 6px;
    }

    .lang-btn {
      flex: 1;
      padding: 6px 4px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      font-family: var(--font);
      font-size: 11px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.15s;
      text-align: center;
    }

    .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
    .lang-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 600;
    }

    /* ══════════════════════════════
       MAIN AREA
    ══════════════════════════════ */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* ── CHAT MESSAGES ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── WELCOME SCREEN ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 32px 16px;
      text-align: center;
      min-height: 60vh;
    }

    .welcome-logo {
      width: 72px;
      height: 72px;
      background: var(--accent);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-md);
    }

    .welcome h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .welcome-sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
      line-height: 1.6;
      max-width: 420px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      max-width: 620px;
      width: 100%;
    }

    @media (max-width: 900px) {
      .cards-grid { grid-template-columns: 1fr 1fr; max-width: 460px; }
    }

    .topic-card {
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      padding: 18px 16px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      box-shadow: var(--shadow);
    }

    .topic-card:hover {
      background: var(--card-hover);
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .card-icon { font-size: 22px; margin-bottom: 8px; display: block; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .card-sub { font-size: 12px; color: var(--text-muted); }

    /* ── MESSAGE ROWS ── */
    .msg-row {
      display: flex;
      gap: 12px;
      max-width: 700px;
      width: 100%;
    }

    .msg-row.user {
      flex-direction: row-reverse;
      align-self: flex-end;
    }

    .msg-row.bot { align-self: flex-start; }

    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-avatar.bot-av {
      background: var(--accent);
    }

    .msg-avatar.user-av {
      background: var(--user-bubble);
      font-size: 14px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.7;
      max-width: calc(100% - 46px);
      word-break: break-word;
    }

    .bubble.bot {
      background: var(--bot-bg);
      border: 1.5px solid var(--card-border);
      border-top-left-radius: 4px;
      color: var(--text);
      box-shadow: var(--shadow);
    }

    .bubble.user {
      background: var(--user-bubble);
      color: var(--user-text);
      border-top-right-radius: 4px;
    }

    .bubble.crisis {
      background: #fff0f0;
      border-color: #f87171;
    }

    /* Markdown rendering */
    .bubble strong { font-weight: 600; color: var(--accent); }
    .bubble.user strong { color: #fbbf24; }
    .bubble em { font-style: italic; color: var(--text-muted); }
    .bubble .msg-step {
      display: block;
      padding: 5px 0 5px 12px;
      border-left: 2px solid var(--accent);
      margin: 5px 0;
    }
    .bubble .warning-block {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 8px;
      padding: 10px 14px;
      margin: 6px 0;
      font-weight: 500;
      color: #92400e;
    }

    /* ── TYPING INDICATOR ── */
    .typing-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 6px 2px;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0.4;
      animation: dot-bounce 1.3s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-7px); opacity: 1; }
    }

    /* ══════════════════════════════
       INPUT AREA
    ══════════════════════════════ */
    #input-area {
      border-top: 1px solid var(--border);
      padding: 14px 32px 12px;
      background: var(--bg);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 700px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 8px 8px 16px;
      transition: border-color 0.2s;
      box-shadow: var(--shadow);
    }

    .input-row:focus-within { border-color: var(--accent); }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      resize: none;
      min-height: 24px;
      max-height: 120px;
      line-height: 1.5;
      padding: 4px 0;
    }

    #user-input::placeholder { color: var(--text-light); }

    #send-btn {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      max-width: 700px;
    }

    .emergency-line {
      font-size: 11px;
      color: var(--text-light);
    }

    .emergency-line strong { color: var(--accent); font-weight: 600; }

    #msg-counter {
      font-size: 11px;
      color: var(--text-light);
    }

    /* ══════════════════════════════
       MOBILE
    ══════════════════════════════ */

    #mobile-header {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #hamburger-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 24px;
      color: var(--text);
      padding: 2px 6px;
      line-height: 1;
      border-radius: 6px;
    }
    #hamburger-btn:active { background: var(--border); }

    #mobile-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .logo-icon-sm {
      width: 30px;
      height: 30px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .logo-name-sm {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
    }

    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
    }

    #sidebar-overlay.open { display: block; }

    @media (max-width: 700px) {
      #mobile-header { display: flex; }

      #sidebar {
        position: fixed;
        left: -280px;
        top: 0;
        bottom: 0;
        z-index: 200;
        width: 260px;
        min-width: 260px;
        transition: left 0.25s ease;
        box-shadow: 4px 0 20px rgba(0,0,0,0.15);
      }

      #sidebar.open { left: 0; }

      #chat { padding: 14px 12px; }
      #input-area {
        padding: 10px 12px;
        padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      }
      .cards-grid { grid-template-columns: 1fr 1fr; max-width: 100%; gap: 8px; }
      .welcome h2 { font-size: 17px; }
      .welcome { padding: 16px 8px; min-height: auto; }
      .welcome-sub { font-size: 13px; margin-bottom: 20px; }
      .welcome-logo { width: 56px; height: 56px; font-size: 28px; margin-bottom: 14px; }
      .input-row { max-width: 100%; }
      .input-footer { max-width: 100%; font-size: 10px; }
      .msg-row { max-width: 100%; }
      .topic-card { padding: 12px; }
      .card-title { font-size: 12px; }
      .card-sub { font-size: 11px; }
      .card-icon { font-size: 18px; margin-bottom: 5px; }
    }
  </style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<aside id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🏮</div>
    <span class="logo-name">K'Helper</span>
  </div>

  <button class="new-chat-btn" onclick="resetChat()">
    <span>＋</span> <span id="new-chat-label">ការសន្ទនាថ្មី</span>
  </button>

  <div class="sidebar-section-label" id="topics-label">ប្រធានបទរហ័ស</div>

  <nav class="sidebar-nav">
    <div class="nav-item" onclick="quickTopic('visa')">
      <span class="nav-icon">🛂</span>
      <span id="nav-visa">វីសា &amp; អន្តោប្រវេសន៍</span>
    </div>
    <div class="nav-item" onclick="quickTopic('work')">
      <span class="nav-icon">💼</span>
      <span id="nav-work">ការងារ &amp; សិទ្ធិ</span>
    </div>
    <div class="nav-item" onclick="quickTopic('health')">
      <span class="nav-icon">🏥</span>
      <span id="nav-health">សុខភាព</span>
    </div>
    <div class="nav-item" onclick="quickTopic('daily')">
      <span class="nav-icon">🌏</span>
      <span id="nav-daily">ជីវិតប្រចាំ</span>
    </div>
    <div class="nav-item" onclick="quickTopic('culture')">
      <span class="nav-icon">🙏</span>
      <span id="nav-culture">វប្បធម៌កូរ៉េ</span>
    </div>
    <div class="nav-item" onclick="quickTopic('language')">
      <span class="nav-icon">💬</span>
      <span id="nav-language">ជំនួយភាសា</span>
    </div>
    <div class="nav-item" onclick="quickTopic('money')">
      <span class="nav-icon">💸</span>

// STATE
// ══════════════════════════════════════════════════
let currentLang = 'km';
let conversationHistory = [];
let chatStarted = false;

// ══════════════════════════════════════════════════
// RATE LIMITER
// ══════════════════════════════════════════════════
const RATE_LIMIT = 30;
const RATE_WINDOW = 60 * 60 * 1000;
const STORAGE_KEY = 'khelper_msg_log';

function getRateData() {
  try {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    return data.filter(t => Date.now() - t < RATE_WINDOW);
  } catch { return []; }
}

function recordMsg() {
  const data = getRateData();
  data.push(Date.now());
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
  return data.length;
}

function getRemainingMsgs() {
  return Math.max(0, RATE_LIMIT - getRateData().length);
}

// ══════════════════════════════════════════════════
// UI UPDATES
// ══════════════════════════════════════════════════
function updateCounter() {
  const n = getRemainingMsgs();
  const t = T[currentLang];
  const el = document.getElementById('msg-counter');
  if (el) {
    el.textContent = t.msgLeft(n);
    el.style.color = n < 5 ? '#ef4444' : n < 10 ? '#f59e0b' : '';
  }
}

function setLang(lang) {
  currentLang = lang;
  ['en','kr','km'].forEach(l => {
    document.getElementById('btn-' + l)?.classList.toggle('active', l === lang);
  });
  const t = T[lang];
  document.getElementById('new-chat-label').textContent = t.newChat;
  document.getElementById('topics-label').textContent = t.topicsLabel;
  document.getElementById('lang-label').textContent = t.langLabel;
  document.getElementById('user-input').placeholder = t.placeholder;
  document.getElementById('emergency-line').innerHTML = t.emergency;

  // Update nav items
  Object.keys(t.navItems).forEach(key => {
    const el = document.getElementById('nav-' + key);
    if (el) el.textContent = t.navItems[key];
  });

  // Update map panel heading
  const mapHeading = document.getElementById('map-panel-heading');
  if (mapHeading) mapHeading.textContent = t.mapPanelTitle;

  updateCounter();

  if (!chatStarted) renderWelcome();
}

// ══════════════════════════════════════════════════

// ══════════════════════════════════════════════════
function renderWelcome() {
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  const t = T[currentLang];

  const w = document.createElement('div');
  w.className = 'welcome';
  w.id = 'welcome-screen';

  w.innerHTML = `
    <div class="welcome-logo">🏮</div>
    <h2>${t.welcomeTitle}</h2>
    <p class="welcome-sub">${t.welcomeSub}</p>
    <div class="cards-grid">
      ${t.cards.map(c => `
        <div class="topic-card" onclick="quickTopic('${c.topic}')">
          <span class="card-icon">${c.icon}</span>
          <div class="card-title">${c.title}</div>
          <div class="card-sub">${c.sub}</div>
        </div>
      `).join('')}
    </div>
  `;

  chat.appendChild(w);
}

// ══════════════════════════════════════════════════
// MARKDOWN RENDERER
// ══════════════════════════════════════════════════
function renderMarkdown(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/(⚠️[^\n]+)/g, '<div class="warning-block">$1</div>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^(\d+)\.\s(.+)$/gm, '<span class="msg-step"><strong>$1.</strong> $2</span>')
    .replace(/^#{1,3}\s(.+)$/gm, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

// ══════════════════════════════════════════════════
// MESSAGES
// ══════════════════════════════════════════════════
function appendMessage(role, content) {
  const chat = document.getElementById('chat');

  // Remove welcome screen
  const welcome = document.getElementById('welcome-screen');
  if (welcome) welcome.remove();
  chatStarted = true;

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${role === 'user' ? 'user-av' : 'bot-av'}`;
  avatar.textContent = role === 'user' ? '🧑' : '🏮';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role === 'user' ? 'user' : 'bot'}`;

  const isCrisis = role !== 'user' && (content.includes('🆘') || content.includes('1393'));
  if (isCrisis) bubble.classList.add('crisis');

  if (role === 'user') {
    bubble.textContent = content;
  } else {
    bubble.innerHTML = renderMarkdown(content);
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-row';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar bot-av';
  avatar.textContent = '🏮';

  const bubble = document.createElement('div');
  bubble.className = 'bubble bot';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

  row.appendChild(avatar);
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  document.getElementById('typing-row')?.remove();
}

// ══════════════════════════════════════════════════
// MAP PANEL FUNCTIONS
// ══════════════════════════════════════════════════
let currentMapTab = 'immigration';

function openMapPanel(tab) {
  currentMapTab = tab || currentMapTab;
  document.getElementById('map-panel').classList.add('open');
  switchMapTab(currentMapTab);
}

function closeMapPanel() {
  document.getElementById('map-panel').classList.remove('open');
}

function switchMapTab(tab) {
  currentMapTab = tab;
  document.querySelectorAll('.map-tab').forEach(btn => {
    btn.classList.toggle('active', btn.id === 'tab-' + tab);
  });
  renderMapLocations(MAP_DATA[tab] || []);
}

function renderMapLocations(locs) {
  const list = document.getElementById('map-locations-list');
  if (!locs.length) {
    list.innerHTML = '<p style="padding:24px;color:var(--text-muted);text-align:center;font-size:13px">No locations found</p>';
    return;
  }
  list.innerHTML = locs.map(loc => `
    <div class="map-location-card">
      <div class="map-loc-name">${loc.name}</div>
      <div class="map-loc-kr">${loc.kr}</div>
      <div class="map-loc-note">${loc.note}</div>
      <div class="map-buttons">
        <a href="https://map.kakao.com/?q=${encodeURIComponent(loc.query)}" target="_blank" rel="noopener" class="map-btn kakao">🗺️ Kakao</a>
        <a href="https://map.naver.com/v5/search/${encodeURIComponent(loc.query)}" target="_blank" rel="noopener" class="map-btn naver">N Naver</a>
        <a href="https://www.google.com/maps/search/${encodeURIComponent(loc.query + ' Korea')}" target="_blank" rel="noopener" class="map-btn google">G Google</a>
      </div>
    </div>
  `).join('');
}

function doMapSearch() {
  const q = document.getElementById('map-search-input').value.trim();
  if (!q) return;
  window.open('https://map.kakao.com/?q=' + encodeURIComponent(q), '_blank');
}

// ══════════════════════════════════════════════════
// QUICK TOPICS
// ══════════════════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

function quickTopic(topic) {
  closeSidebar();
  if (topic === 'location') {
    openMapPanel('places');
    return;
  }
  const msg = T[currentLang].topics[topic];
  if (msg) {
    document.getElementById('user-input').value = msg;
    sendMessage();
  }
}

// ══════════════════════════════════════════════════
// RESET
// ══════════════════════════════════════════════════
function resetChat() {
  closeSidebar();
  conversationHistory = [];
  chatStarted = false;
  renderWelcome();
}

// ══════════════════════════════════════════════════
// SEND MESSAGE
// ══════════════════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  if (getRemainingMsgs() <= 0) {
    appendMessage('assistant', T[currentLang].langLabel === 'ភាសា'
      ? '⚠️ អ្នកបានផ្ញើសារច្រើនពេក។ សូមមកម្តងទៀតក្នុង ១ ម៉ោង។ ប្រសិនបើបន្ទាន់ ទូរស័ព្ទ 1345 ឬ 112។'
      : '⚠️ Message limit reached for this hour. Please wait 60 minutes. For urgent help call 1345 or 112.');
    return;
  }

  recordMsg();
  updateCounter();

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  showTyping();

  try {
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory }),
    });

    hideTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      appendMessage('assistant', err.error || 'Error. Please try again.');
      conversationHistory.pop();
    } else {
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || 'Sorry, pleas
