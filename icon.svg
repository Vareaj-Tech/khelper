<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#d94e1f"/>

  <!-- Lantern top hook -->
  <rect x="244" y="30" width="24" height="36" rx="12" fill="#fce8df"/>

  <!-- Lantern top cap -->
  <rect x="168" y="66" width="176" height="28" rx="8" fill="#fce8df"/>

  <!-- Lantern body -->
  <rect x="148" y="94" width="216" height="252" rx="20" fill="#fff7f3"/>

  <!-- Lantern glow (inner) -->
  <rect x="172" y="118" width="168" height="204" rx="14" fill="#ffeedd"/>

  <!-- Lantern flame glow -->
  <ellipse cx="256" cy="220" rx="52" ry="62" fill="#ffb347" opacity="0.6"/>
  <ellipse cx="256" cy="210" rx="32" ry="48" fill="#ff7c1a" opacity="0.8"/>
  <ellipse cx="256" cy="200" rx="16" ry="32" fill="#fff0c0"/>

  <!-- Lantern vertical ribs -->
  <rect x="195" y="94" width="8" height="252" rx="4" fill="#d94e1f" opacity="0.25"/>
  <rect x="252" y="94" width="8" height="252" rx="4" fill="#d94e1f" opacity="0.25"/>
  <rect x="309" y="94" width="8" height="252" rx="4" fill="#d94e1f" opacity="0.25"/>

  <!-- Lantern bottom cap -->
  <rect x="168" y="346" width="176" height="28" rx="8" fill="#fce8df"/>

  <!-- Lantern tassel -->
  <rect x="248" y="374" width="16" height="50" rx="8" fill="#fce8df"/>
  <ellipse cx="256" cy="430" rx="14" ry="18" fill="#fce8df"/>

  <!-- Khmer letter k (stylized) — small label -->
  <text x="256" y="290" font-family="serif" font-size="72" font-weight="bold" fill="#d94e1f" text-anchor="middle" opacity="0.15">ក</text>
</svg>
