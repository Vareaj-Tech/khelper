# K'HELPER — NETLIFY CONFIGURATION

[build]
  publish = "."
  functions = "Netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Redirect all API calls through the secure function
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

# Health check endpoint (for monitoring tools like UptimeRobot)
[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

# Force HTTPS on your custom domain
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://fonts.gstatic.com; connect-src 'self' https://*.netlify.app https://khelper.org;"
